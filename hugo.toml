baseURL = 'http://localhost:1313/'
languageCode = 'en-us'
title = 'LiangKX'
theme = 'gokarna'
enableEmoji = true
enableRobotsTXT = true

[params]
  avatarURL = "/images/avatar.png"
  avatarAltText = "LiangKX"
  avatarSize = "size-m"
  dateFormat = "1月2日"
  description = """
从小就喜欢吹牛，花毕生养成的习惯改不了

世界和平贡献者
"""
  footer = "LiangKX"
  showBackToTopButton = true

  customHeadHTML = """
    <script>
      /* Force light mode as default, only switch to dark if user explicitly chose it */
      if (!localStorage.getItem('theme-preference')) {
        localStorage.setItem('theme-preference', 'light');
      }
    </script>
    <style>
      :root {
        --accent-color: #3451b2; /* light default */
      }

      html {
        font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, "Noto Sans", "Hiragino Sans GB", "Microsoft YaHei", sans-serif !important;
      }

      /* Render newlines in home description */
      .home-about .home-description {
        white-space: pre-line;
        color: inherit;
        opacity: 0.7;
        font-weight: 400;
      }

      /* Only change links inside article content (not list pages) */
      .post-content a,
      .post-content a:visited {
        color: var(--accent-color) !important;
      }

      .post-content a:hover {
        color: var(--accent-color) !important;
      }

      /* Article content typography */
      .post-content {
        font-size: 0.92rem;
        line-height: 1.00;
      }

      /* Post title font size overrides */
      .post-title .post-link {
        font-size: 0.85rem !important;
      }
      .post-title .post-date {
        font-size: 0.75rem !important;
      }

      /* Keep all social icons (injected svg or img) uniform */
      .gk-social-icons-list .gk-social-icon a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .gk-social-icons-list .gk-social-icon img,
      .gk-social-icons-list .gk-social-icon svg {
        width: 24px;
        height: 24px;
        max-width: 24px;
        max-height: 24px;
        display: block;
      }

      /* Ensure social SVGs follow hover color (some icons hardcode fill) */
      .gk-social-icons-list .gk-social-icon svg {
        fill: currentColor;
      }
      .gk-social-icons-list .gk-social-icon svg * {
        fill: currentColor !important;
      }
      /* The built-in email icon has a 128x128 viewBox and looks larger; scale it down a bit */
      .gk-social-icons-list .gk-social-icon svg[viewBox="0 0 128 128"] {
        transform: scale(0.85);
        transform-origin: 50% 50%;
      }
      .gk-social-icons-list .gk-social-icon a {
        color: inherit;
      }
      .gk-social-icons-list .gk-social-icon a:hover {
        color: var(--accent-color);
      }

      /* Unified pill-style tags (blog list / post / portfolio) */
      .post-tags {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .post-tags .post-tag {
        border: 1.5px solid rgba(128, 128, 128, 0.25) !important;
        border-radius: 10px !important;
        background: transparent;
        font-size: 0.82rem !important;
        padding: 0.3rem 1rem !important;
        margin: 0 !important;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: background 0.18s, color 0.18s, border-color 0.18s;
      }
      .post-tags .post-tag a {
        padding: 0 !important;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: inherit;
      }
      .post-tags .post-tag a .tag-name,
      .post-tags .post-tag a .tag-posts-count {
        padding: 0 !important;
        display: inline;
      }
      .post-tags .post-tag a .tag-posts-count {
        background: transparent !important;
        opacity: 0.5;
        font-size: 0.78rem;
      }
      .post-tags .post-tag:hover {
        background: #111;
        color: #fff;
        border-color: transparent !important;
      }
      .post-tags .post-tag:hover a,
      .post-tags .post-tag:hover a .tag-posts-count {
        color: #fff;
      }

      /* Blog list: hover gray background on each row */
      .list-posts .post-title {
        margin: 4px 0 !important;
        padding: 10px 14px;
        border-radius: 10px;
        transition: background 0.15s ease;
      }
      /* Title takes full row width (theme's 73% cap would wrap prematurely on mobile) */
      .list-posts .post-title .post-link {
        width: 100% !important;
        display: block;
        word-break: break-word;
      }
      .list-posts .post-title:hover {
        background: rgba(128, 128, 128, 0.1);
      }
      /* Desktop: flex row so hover bg ends right after the date */
      @media (min-width: 820px) {
        .list-posts .post-title {
          display: flex !important;
          justify-content: space-between;
          align-items: baseline;
          gap: 1rem;
        }
        .list-posts .post-title .post-link {
          width: auto !important;
          display: inline-block;
          flex: 1 1 auto;
          min-width: 0;
        }
        .list-posts .post-title .post-date {
          flex-shrink: 0;
        }
      }

      /* Dark theme override: stone / 灰褐 tone */
      html[data-theme="dark"] {
        --dark-primary-color: 14, 13, 13;     /* rgb(14, 13, 13) stone-900 主背景 */
        --dark-secondary-color: #292524;      /* stone-800 代码块/表头 */
        --dark-tertiary-color: #57534e;       /* stone-600 分隔线/行内 code */
        --dark-text-color: #e7e5e4;           /* stone-200 正文文字 */
      }
      html[data-theme="dark"] body {
        background-color: rgb(var(--dark-primary-color));
      }
      /* Custom hover bg in dark mode */
      html[data-theme="dark"] .list-posts .post-title:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      html[data-theme="dark"] .post-tags .post-tag {
        border-color: rgba(255, 255, 255, 0.18) !important;
      }
      html[data-theme="dark"] .post-tags .post-tag:hover {
        background: #fff;
        color: #1c1917;
      }
      html[data-theme="dark"] .post-tags .post-tag:hover a,
      html[data-theme="dark"] .post-tags .post-tag:hover a .tag-posts-count {
        color: #1c1917;
      }
      /* Portfolio filter buttons in dark mode */
      html[data-theme="dark"] .pf-btn {
        border-color: rgba(255, 255, 255, 0.18);
      }
      html[data-theme="dark"] .pf-btn:hover,
      html[data-theme="dark"] .pf-btn.active {
        background: #fff;
        color: #1c1917;
      }
      html[data-theme="dark"] .pf-card {
        border-color: rgba(255, 255, 255, 0.1);
      }
      html[data-theme="dark"] .pf-tag {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  """

  socialIcons = [
    {name = "github", url = "https://github.com/Liangkexi"},
    {name = "x", url = "https://twitter.com/LiangKx"},
    {name = "netease-cloud-music", url = "https://y.music.163.com/m/user?id=425691033&dlt=0846&app_version=8.10.10"}
  ]

[menu]
  [[menu.main]]
    name = "主页"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "博客"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "仓库"
    pre = "<span data-feather='box'></span>"
    url = "/portfolio/"
    weight = 4

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false

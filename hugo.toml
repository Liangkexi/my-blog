baseURL = 'https://my-blog-bck.pages.dev/'
languageCode = 'en-us'
title = 'LiangKX'
theme = 'gokarna'
enableEmoji = true
enableRobotsTXT = true

[params]
  avatarURL = "/images/avatar.png"
  avatarAltText = "LiangKX"
  avatarSize = "size-m"
  description = "世界和平贡献者"
  footer = "LiangKX"
  showBackToTopButton = true

  customHeadHTML = """
    <style>
      /* Ensure custom social SVGs never overflow their container */
      .gk-social-icons-list .gk-social-icon a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
      }
      .gk-social-icons-list .gk-social-icon img {
        width: 24px;
        height: 24px;
        max-width: 24px;
        max-height: 24px;
        display: block;
      }
    </style>
  """

  socialIcons = [
    {name = "github", url = "https://github.com/Liangkexi"},
    {name = "twitter", url = "https://twitter.com/LiangKx"},
    {name = "netease-cloud-music", url = "https://y.music.163.com/m/user?id=425691033&dlt=0846&app_version=8.10.10"}
  ]

[menu]
  [[menu.main]]
    name = "Home"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Posts"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Tags"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 3

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false

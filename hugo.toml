baseURL = 'https://liangkx.com/'
languageCode = 'en-us'
title = 'LiangKX'
theme = 'gokarna'
enableEmoji = true
enableRobotsTXT = true

[params]
  avatarURL = "/images/avatar.png"
  avatarAltText = "LiangKX"
  avatarSize = "size-m"
  dateFormat = "1月2日"
  description = """
从小就喜欢吹牛，花毕生养成的习惯改改不了

世界和平贡献者
"""
  footer = "LiangKX"
  showBackToTopButton = true

  customHeadHTML = """
    <script>
      /* Force light mode as default, only switch to dark if user explicitly chose it */
      if (!localStorage.getItem('theme-preference')) {
        localStorage.setItem('theme-preference', 'light');
      }
    </script>
    <script>
      (function () {
        const STORAGE_KEY = 'theme-preference';
        const COLORS = {
          light: { accent: '#3451b2' },
          dark: { accent: '#a0a9f3', darkPrimaryRgb: '28, 28, 32' } // #1c1c20
        };

        function getTheme() {
          const t = localStorage.getItem(STORAGE_KEY);
          return (t === 'dark' || t === 'light') ? t : 'light';
        }

        function applyThemeVars() {
          const theme = getTheme();
          const root = document.documentElement;

          root.style.setProperty('--accent-color', COLORS[theme].accent);
          if (theme === 'dark') {
            root.style.setProperty('--dark-primary-color', COLORS.dark.darkPrimaryRgb);
          } else {
            root.style.removeProperty('--dark-primary-color');
          }
        }

        document.addEventListener('DOMContentLoaded', () => {
          applyThemeVars();
          document.querySelectorAll('.dark-theme-toggle').forEach(el => {
            el.addEventListener('click', () => {
              // wait for theme-preference to update
              setTimeout(applyThemeVars, 0);
            }, { capture: true });
          });
        });
      })();
    </script>
    <style>
      :root {
        --accent-color: #3451b2; /* light default */
      }

      html {
        font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, "Noto Sans", "Hiragino Sans GB", "Microsoft YaHei", sans-serif !important;
      }

      /* Render newlines in home description */
      .home-about .home-description {
        white-space: pre-line;
        color: inherit;
        opacity: 0.7;
        font-weight: 400;
      }

      /* Only change links inside article content (not list pages) */
      .post-content a,
      .post-content a:visited {
        color: var(--accent-color) !important;
      }

      .post-content a:hover {
        color: var(--accent-color) !important;
      }

      /* Article content typography */
      .post-content {
        font-size: 0.92rem;
        line-height: 1.00;
      }

      /* Post title font size overrides */
      .post-title .post-link {
        font-size: 0.85rem !important;
      }
      .post-title .post-date {
        font-size: 0.75rem !important;
      }

      /* Keep all social icons (injected svg or img) uniform */
      .gk-social-icons-list .gk-social-icon a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .gk-social-icons-list .gk-social-icon img,
      .gk-social-icons-list .gk-social-icon svg {
        width: 24px;
        height: 24px;
        max-width: 24px;
        max-height: 24px;
        display: block;
      }

      /* Ensure social SVGs follow hover color (some icons hardcode fill) */
      .gk-social-icons-list .gk-social-icon svg {
        fill: currentColor;
      }
      .gk-social-icons-list .gk-social-icon svg * {
        fill: currentColor !important;
      }
      /* The built-in email icon has a 128x128 viewBox and looks larger; scale it down a bit */
      .gk-social-icons-list .gk-social-icon svg[viewBox="0 0 128 128"] {
        transform: scale(0.85);
        transform-origin: 50% 50%;
      }
      .gk-social-icons-list .gk-social-icon a {
        color: inherit;
      }
      .gk-social-icons-list .gk-social-icon a:hover {
        color: var(--accent-color);
      }
    </style>
  """

  socialIcons = [
    {name = "github", url = "https://github.com/Liangkexi"},
    {name = "x", url = "https://twitter.com/LiangKx"},
    {name = "netease-cloud-music", url = "https://y.music.163.com/m/user?id=425691033&dlt=0846&app_version=8.10.10"}
  ]

[menu]
  [[menu.main]]
    name = "主页"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "博客"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "分类"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 3

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false

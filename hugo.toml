baseURL = 'https://my-blog-bck.pages.dev/'
languageCode = 'en-us'
title = 'LiangKX'
theme = 'gokarna'
enableEmoji = true
enableRobotsTXT = true

[params]
  avatarURL = "/images/avatar.png"
  avatarAltText = "LiangKX"
  avatarSize = "size-m"
  description = "世界和平贡献者"
  footer = "LiangKX"
  showBackToTopButton = true

  customHeadHTML = """
    <style>
      html {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif !important;
      }

      /* Only change links inside article content (not list pages) */
      .post-content a,
      .post-content a:visited {
        color: var(--accent-color) !important;
      }

      /* Post title font size overrides */
      .post-title .post-link {
        font-size: 0.95rem !important;
      }
      .post-title .post-date {
        font-size: 0.85rem !important;
      }

      /* Keep all social icons (injected svg or img) uniform */
      .gk-social-icons-list .gk-social-icon a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .gk-social-icons-list .gk-social-icon img,
      .gk-social-icons-list .gk-social-icon svg {
        width: 24px;
        height: 24px;
        max-width: 24px;
        max-height: 24px;
        display: block;
      }
    </style>
  """

  socialIcons = [
    {name = "github", url = "https://github.com/Liangkexi"},
    {name = "twitter", url = "https://twitter.com/LiangKx"},
    {name = "netease-cloud-music", url = "https://y.music.163.com/m/user?id=425691033&dlt=0846&app_version=8.10.10"}
  ]

[menu]
  [[menu.main]]
    name = "Home"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Posts"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Tags"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 3

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false
